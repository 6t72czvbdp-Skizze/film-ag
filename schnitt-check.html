<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check – schnitt</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0c0c14; color: #fff; min-height: 100vh; padding: 20px 16px 60px; }
  .wrap { max-width: 500px; margin: 0 auto; }
  .header { border-radius: 20px; padding: 22px 20px; margin-bottom: 20px; text-align: center; }
  .header h1 { font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 900; color: #fff; margin-bottom: 4px; }
  .header p { font-size: 0.82rem; color: rgba(255,255,255,0.7); }
  .name-input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 11px 14px; color: #fff; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; outline: none; margin-bottom: 16px; }
  .section-label { font-size: 0.65rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; margin: 20px 0 10px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
  .check-item { display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; }
  .check-item.yes { background: rgba(16,185,129,0.12); border-color: #10b981; }
  .check-item.no  { background: rgba(239,68,68,0.1); border-color: #ef4444; }
  .check-box { width: 36px; height: 36px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
  .check-item.yes .check-box { background: #10b981; border-color: #10b981; }
  .check-item.no  .check-box { background: rgba(239,68,68,0.3); border-color: #ef4444; }
  .check-title { font-size: 0.92rem; font-weight: 700; color: rgba(255,255,255,0.9); margin-bottom: 2px; }
  .check-sub { font-size: 0.74rem; color: rgba(255,255,255,0.4); line-height: 1.4; }
  .yn-row { display: flex; gap: 6px; flex-shrink: 0; }
  .yn-btn { border: none; border-radius: 8px; padding: 6px 10px; font-size: 0.78rem; font-weight: 800; cursor: pointer; }
  .yn-btn.y { background: rgba(16,185,129,0.2); color: #6ee7b7; }
  .yn-btn.n { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .check-item.yes .yn-btn.y { background: #10b981; color: #fff; }
  .check-item.no  .yn-btn.n { background: #ef4444; color: #fff; }
  .score-box { border-radius: 16px; padding: 20px; margin-top: 20px; text-align: center; display: none; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
  .score-box.show { display: block; }
  .score-num { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; color: #34d399; }
  .score-text { font-size: 0.86rem; color: rgba(255,255,255,0.6); margin-top: 6px; }
  .tip-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 14px; margin-top: 10px; font-size: 0.8rem; color: rgba(255,255,255,0.5); line-height: 1.6; display: none; }
  .tip-box.show { display: block; }
  .reset-btn { margin-top: 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 12px; width: 100%; color: rgba(255,255,255,0.5); font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const configs = {
  zeitreise: {
    emoji: '⏳', title: 'Zeitreise-Check', sub: 'Schaut euch die Szene an und hakt ab!',
    color: '#7c3aed', qr: 'zeitreise-check',
    sections: [
      { label: '🕰️ Recherche & Inhalt', items: [
        ['Historisch korrekt','Stimmt das was gezeigt wird – haben wir das nachgeschaut?'],
        ['Thema klar erklärt','Man versteht was früher anders war als heute'],
        ['Zeitraum genannt','Wann spielt die Szene? Das wird deutlich gesagt'],
      ]},
      { label: '🎭 Szene & Auftritt', items: [
        ['Szene gut nachgespielt','Die Kinder spielen glaubwürdig – nicht zu albern'],
        ['Kostüm oder Detail dabei','Ein kleines Detail zeigt dass es früher war'],
        ['Deutlich gesprochen','Man hört und versteht alles'],
      ]},
    ]
  },
  'check-wissenschaft': {
    emoji: '🔬', title: 'Forscher-Check', sub: 'Schaut euch den Forschungsclip an!',
    color: '#059669', qr: 'check-wissenschaft-check',
    sections: [
      { label: '🔬 Hypothese & Experiment', items: [
        ['Frage klar gestellt','Was wollten wir herausfinden? Das wird am Anfang erklärt'],
        ['Experiment gezeigt','Man sieht was gemacht wurde – nicht nur erzählt'],
        ['Ergebnis benannt','Was ist passiert? Das Ergebnis wird klar ausgesprochen'],
      ]},
      { label: '📢 Erklärung & Präsentation', items: [
        ['Ergebnis erklärt','Warum ist das passiert? Eine Erklärung wird gegeben'],
        ['Verständlich für alle','Auch jemand der nicht dabei war versteht den Clip'],
        ['Ruhige Kamera & gutes Licht','Technisch gut – man sieht das Experiment deutlich'],
      ]},
    ]
  },
  schnitt: {
    emoji: '✂️', title: 'Schnitt-Check', sub: 'Schaut euch den fertigen Clip an!',
    color: '#0284c7', qr: 'schnitt-check',
    sections: [
      { label: '▶️ Anfang & Ende', items: [
        ['Sauberer Anfang','Kein unnötiges Material am Anfang – sofort los'],
        ['Sauberes Ende','Kein Herumstehen nach dem letzten Satz – Clip endet sauber'],
        ['Richtige Länge','Nicht zu lang, nicht zu kurz – genau so lang wie nötig'],
      ]},
      { label: '🎵 Bild & Ton', items: [
        ['Ton durchgehend gut','Kein plötzliches Knacken oder Stille'],
        ['Bild stabil','Kein Wackeln oder plötzlicher Schnitt der stört'],
        ['Alles gespeichert','Der fertige Clip ist auf dem iPad gespeichert'],
      ]},
    ]
  }
};

const key = location.pathname.split('/').pop().replace('-check.html','').replace('check-','');
const cfg = configs[location.pathname.includes('zeitreise') ? 'zeitreise' : location.pathname.includes('wissenschaft') ? 'check-wissenschaft' : 'schnitt'];

let items = [];
cfg.sections.forEach(s => s.items.forEach(i => items.push(i)));
const state = new Array(items.length).fill(null);

document.getElementById('app').innerHTML = `
  <div style="background:linear-gradient(135deg,${cfg.color}99,${cfg.color}44);border-radius:20px;padding:22px 20px;margin-bottom:20px;text-align:center;">
    <div style="font-size:2rem;margin-bottom:8px;">${cfg.emoji}</div>
    <h1 style="font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:900;color:#fff;margin-bottom:4px;">${cfg.title}</h1>
    <p style="font-size:0.82rem;color:rgba(255,255,255,0.7);">${cfg.sub}</p>
    <div style="margin-top:14px;display:flex;flex-direction:column;align-items:center;gap:6px;">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://6t72czvbdp-skizze.github.io/film-ag/${cfg.qr}.html&bgcolor=ffffff&color=000000" style="border-radius:8px;width:90px;height:90px;">
      <div style="font-size:0.72rem;color:rgba(255,255,255,0.5);">Mit iPad einscannen</div>
    </div>
  </div>
  <input style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:11px 14px;color:#fff;font-size:0.9rem;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:16px;" type="text" placeholder="👤 Wer wird bewertet?">
  ${cfg.sections.map((s,si) => {
    let idx = 0;
    cfg.sections.slice(0,si).forEach(ps => idx += ps.items.length);
    return `<div style="font-size:0.65rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin:20px 0 10px;display:flex;align-items:center;gap:8px;">${s.label}<span style="flex:1;height:1px;background:rgba(255,255,255,0.1);display:block;"></span></div>
    ${s.items.map((item,ii) => {
      const i = idx + ii;
      return `<div class="check-item" id="item-${i}">
        <div class="check-box" id="box-${i}">·</div>
        <div style="flex:1;"><div class="check-title">${item[0]}</div><div class="check-sub">${item[1]}</div></div>
        <div class="yn-row">
          <button class="yn-btn y" onclick="setCheck(${i},'yes',event)">✓</button>
          <button class="yn-btn n" onclick="setCheck(${i},'no',event)">✗</button>
        </div>
      </div>`;
    }).join('')}`;
  }).join('')}
  <div class="score-box" id="score-box"><span id="score-emoji" style="font-size:2.5rem;display:block;margin-bottom:8px;">${cfg.emoji}</span><div class="score-num" id="score-num"></div><div class="score-text" id="score-text"></div></div>
  <div class="tip-box" id="tip-box"></div>
  <button class="reset-btn" onclick="location.reload()">↺ Nochmal</button>
`;

function setCheck(i,v,e){
  e.stopPropagation();state[i]=v;
  const it=document.getElementById('item-'+i);
  const bx=document.getElementById('box-'+i);
  it.className='check-item '+v;
  bx.textContent=v==='yes'?'✓':'✗';
  if(state.filter(s=>s!==null).length===items.length){
    const yes=state.filter(s=>'yes'===s).length;
    const sb=document.getElementById('score-box');sb.classList.add('show');
    document.getElementById('score-num').textContent=yes+' von '+items.length+' ✓';
    const em=yes>=items.length-1?'🏆':yes>=Math.floor(items.length*0.6)?'⭐':'💪';
    const tx=yes>=items.length-1?'Super – fast perfekt!':yes>=Math.floor(items.length*0.6)?'Gut gemacht!':'Beim nächsten Mal wird es besser!';
    document.getElementById('score-emoji').textContent=em;
    document.getElementById('score-text').textContent=tx;
    const no=state.map((s,i)=>s==='no'?items[i][0]:null).filter(Boolean);
    if(no.length){const tb=document.getElementById('tip-box');tb.classList.add('show');tb.innerHTML='🚀 <strong>Nächstes Mal:</strong><br>'+no.map(l=>'· '+l).join('<br>');}
  }
}
</script>
  <div style="text-align:center;padding:16px 16px 40px;">
    <a href="javascript:history.back()" style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:20px;padding:10px 20px;color:rgba(255,255,255,0.7);font-size:0.85rem;font-weight:700;text-decoration:none;">← Zurück</a>
  </div>
</body>
</html>
