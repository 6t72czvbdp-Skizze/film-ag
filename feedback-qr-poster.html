<title>Wie war's? – Film-AG Feedback</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=DM+Sans:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0c0c14; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }

  .card {
    background: linear-gradient(145deg, #1a0a2e, #0f0f1a);
    border: 1.5px solid rgba(192,38,211,0.3);
    border-radius: 28px;
    padding: 36px 28px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 60px rgba(192,38,211,0.15);
  }

  .emoji-row {
    font-size: 2rem;
    margin-bottom: 10px;
    letter-spacing: 4px;
  }

  .headline {
    font-family: 'Outfit', sans-serif;
    font-size: 2.4rem;
    font-weight: 900;
    color: #fff;
    margin-bottom: 8px;
    line-height: 1.1;
  }

  .sub {
    font-size: 0.92rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .qr-wrap {
    background: #fff;
    border-radius: 20px;
    padding: 16px;
    display: inline-block;
    margin-bottom: 24px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
  }

  .qr-wrap img {
    width: 200px;
    height: 200px;
    display: block;
    border-radius: 8px;
  }

  .steps {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .step-icon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
  }
  .step-arrow { color: rgba(255,255,255,0.2); font-size: 1rem; margin-top: 12px; }
  .step-lbl { font-size: 0.68rem; color: rgba(255,255,255,0.4); font-weight: 600; }

  .footer-text {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.25);
    margin-top: 4px;
  }

  @media print {
    body { background: #fff; }
    .card { background: #fff; border: 2px solid #c026d3; box-shadow: none; }
    .headline { color: #000; }
    .sub { color: #555; }
    .step-icon { background: #f5f5f5; border: 1px solid #ddd; }
    .step-lbl { color: #888; }
    .footer-text { color: #bbb; }
  }
</style>
</head>
